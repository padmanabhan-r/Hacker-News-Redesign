<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="HN++">
  <defs>
    <linearGradient id="hnpp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9500"></stop>
      <stop offset="100%" stop-color="#ff6600"></stop>
    </linearGradient>
    <filter id="hnpp-glow" x="-20%" y="-20%" width="140%" height="140%">
