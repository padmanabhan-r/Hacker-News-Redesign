    </filter>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#hnpp-bg)"></rect>
  <rect x="2.5" y="2.5" width="59" height="59" rx="13.5" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1"></rect>
  <g fill="#ffffff" font-family="&#39;Syne&#39;, system-ui, sans-serif" font-weight="800" filter="url(#hnpp-glow)">
    <text x="32" y="42" text-anchor="middle" font-size="30" letter-spacing="-1">++</text>
  </g>
